name: Build

# 自动编译：push 到 main、打 tag (v*)、PR、手动触发
# - push / PR：只构建并上传 artifact（保留 2 天）
# - 打 v* tag：额外创建 GitHub Release，把三平台产物作为 assets 发布，
#              release 版本号 = tag 名（如 v1.2.0）
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 桌面端：Windows + Linux
  # ──────────────────────────────────────────────────────────────────────────
  build-desktop:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-22.04
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      # tauri.conf.json 里 bundle.targets 只有 ["msi"]（Windows 专属），
      # 在各平台用 --bundles 显式覆盖，确保 Linux 也能产出安装包。
      - name: Build (Windows)
        if: matrix.name == 'windows'
        run: npx tauri build --bundles msi,nsis

      - name: Build (Linux)
        if: matrix.name == 'linux'
        run: npx tauri build --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NClientT-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 2
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Android：APK (universal release)
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build (android)
    runs-on: ubuntu-22.04
    env:
      NDK_VERSION: '27.0.12077973'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools build-tools;34.0.0 platforms;android-34 ndk;${{ env.NDK_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Export NDK env vars
        run: |
          NDK="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          echo "ANDROID_NDK=$NDK" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK" >> $GITHUB_ENV

      - run: npm ci

      - name: Init Tauri Android project
        run: npx tauri android init --ci

      - name: Build Android APK
        run: npx tauri android build --apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NClientT-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 2
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Release：仅打 v* tag 时运行。汇总三平台产物发布到 GitHub Releases。
  # 版本号 = tag 名（v1.2.0），不修改源码里的 0.1.0。
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [build-desktop, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      # download-artifact 把每个 artifact 解压到 assets/<artifact-name>/，
      # 内部保留原始相对路径（如 .../bundle/msi/xxx.msi）。
      # 这里把安装包展平到 out/，并加上平台前缀（windows- / linux- / android-）。
      - name: Flatten artifacts
        run: |
          set -e
          mkdir -p out
          for plat in windows linux android; do
            src="assets/NClientT-${plat}"
            [ -d "$src" ] || continue
            find "$src" -type f \( \
              -name '*.msi' -o -name '*.exe' -o \
              -name '*.deb' -o -name '*.AppImage' -o \
              -name '*.apk' -o -name '*.aab' \
              \) -print0 | while IFS= read -r -d '' f; do
                cp "$f" "out/${plat}-$(basename "$f")"
              done
          done
          ls -la out

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: out/*
