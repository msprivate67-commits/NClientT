name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build (Android arm64-v8a)
    runs-on: ubuntu-22.04
    env:
      NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4
        with:
          packages: "tools platform-tools build-tools;36.0.0 platforms;android-36 ndk;${{ env.NDK_VERSION }}"

      - name: Export Android environment variables
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          NDK="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "NDK_HOME=$NDK" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Generate icons
        run: |
          if [ -f src-tauri/icons/icon.png ]; then
            node scripts/make-icons.mjs
            node scripts/make-android-icons.mjs
          else
            echo "No icon.png found, using committed icons"
          fi

      - name: Initialize Tauri Android project when missing
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            npx tauri android init --ci
          else
            echo "src-tauri/gen/android already exists, skipping init"
          fi

      - name: Build Android APK
        run: npx tauri android build --apk --target aarch64 --split-per-abi

      - name: Sign Android APK
        if: hashFiles('src-tauri/nclientt.keystore') != ''
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/36.0.0"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          shopt -s nullglob
          for apk in "$APK_DIR"/*/release/*-unsigned.apk; do
            signed="${apk%-unsigned.apk}.apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks src-tauri/nclientt.keystore \
              --ks-pass pass:nclientt \
              --ks-key-alias nclientt \
              --key-pass pass:nclientt \
              --out "$signed" \
              --in "$apk"
            rm -f "$apk"
          done

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: NClientT-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          retention-days: 2
          if-no-files-found: error

  build-windows:
    name: Build (Windows exe + msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build portable executable and MSI
        run: npx tauri build --bundles msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NClientT-windows
          path: |
            src-tauri/target/release/nclientt-bin.exe
            src-tauri/target/release/bundle/msi/**/*.msi
          retention-days: 2
          if-no-files-found: error

  build-linux:
    name: Build (Linux executable)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build portable Linux executable
        run: npx tauri build --no-bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: NClientT-linux
          path: src-tauri/target/release/nclientt-bin
          retention-days: 2
          if-no-files-found: error

  release:
    name: Replace pre-release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-linux]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=prerelease-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_ENV"

          windows_exe=$(find artifacts/NClientT-windows -type f -name "nclientt-bin.exe" | head -n1 || true)
          [ -n "$windows_exe" ] || { echo "ERROR: no portable Windows executable found"; exit 1; }
          cp "$windows_exe" "release/NClientT-${SHORT_SHA}-windows.exe"

          windows_msi=$(find artifacts/NClientT-windows -type f -name "*.msi" | head -n1 || true)
          [ -n "$windows_msi" ] || { echo "ERROR: no Windows MSI found"; exit 1; }
          cp "$windows_msi" "release/NClientT-${SHORT_SHA}-windows.msi"

          linux_bin=$(find artifacts/NClientT-linux -type f -name "nclientt-bin" | head -n1 || true)
          [ -n "$linux_bin" ] || { echo "ERROR: no portable Linux executable found"; exit 1; }
          cp "$linux_bin" "release/NClientT-${SHORT_SHA}-linux-x86_64"
          chmod +x "release/NClientT-${SHORT_SHA}-linux-x86_64"

          android_apk=$(find artifacts/NClientT-android -type f -name "*.apk" | head -n1 || true)
          [ -n "$android_apk" ] || { echo "ERROR: no Android arm64-v8a APK found"; exit 1; }
          cp "$android_apk" "release/NClientT-${SHORT_SHA}-android-arm64-v8a.apk"

          echo "Staged release assets:"
          ls -la release/

      - name: Delete all existing pre-releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t prerelease_tags < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq '.[] | select(.prerelease) | .tag_name'
          )
          for tag in "${prerelease_tags[@]}"; do
            echo "Deleting pre-release: $tag"
            gh release delete "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --cleanup-tag \
              --yes
          done

      - name: Create new pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          Automated pre-release build from commit [${GITHUB_SHA:0:7}](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}).

          Build time: ${BUILD_TIME}

          ## Downloads
          - Android: arm64-v8a APK
          - Windows: portable executable and MSI installer
          - Linux: portable x86_64 executable
          EOF
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Pre-release ${GITHUB_SHA:0:7}" \
            --notes-file release-notes.md \
            --prerelease

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" release/* \
            --repo "$GITHUB_REPOSITORY"
