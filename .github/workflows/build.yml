name: Build

on:
  workflow_dispatch:

permissions:
  contents: write   # needed by the release job to create/update the nightly pre-release

jobs:
  build-android:
    name: Build (android)
    runs-on: ubuntu-22.04
    env:
      NDK_VERSION: '27.0.12077973'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v4
        with:
          packages: 'tools platform-tools build-tools;34.0.0 platforms;android-34 ndk;${{ env.NDK_VERSION }}'

      - name: Export Android env vars
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          NDK="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK" >> $GITHUB_ENV

      # Only build the ARMv8 (arm64-v8a / aarch64) target — this is a
      # phone-only app and essentially every modern Android phone is 64-bit
      # ARM. The other ABIs (armv7 legacy, x86/i686 emulators / Intel tablets)
      # are dead weight that bloat the release and double CI time, so we ship
      # only arm64-v8a.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Regenerate all icons from the source icon.png so CI never ships
      # stale/default Tauri icons. This includes both desktop and Android
      # mipmap assets.
      - name: Generate all icons from source
        run: |
          if [ -f src-tauri/icons/icon.png ]; then
            node scripts/make-icons.mjs
            node scripts/make-android-icons.mjs
          else
            echo "No icon.png found, using committed icons"
          fi

      # gen/android (with the storage-permission AndroidManifest.xml) is
      # committed to the repo, so we only scaffold it when missing — running
      # `tauri android init` unconditionally would overwrite our manifest.
      - name: Init Tauri Android project (only if not scaffolded)
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            npx tauri android init --ci
          else
            echo "src-tauri/gen/android already exists, skipping init"
          fi

      # --target aarch64 limits the build to the single arm64-v8a ABI.
      # --split-per-abi produces one APK per ABI instead of a fat universal
      # APK, so users download only what their device needs.
      - name: Build Android APK (arm64-v8a only)
        run: npx tauri android build --apk --target aarch64 --split-per-abi

      - name: Sign APKs
        if: hashFiles('src-tauri/nclientt.keystore') != ''
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          # With --split-per-abi the APKs live under per-ABI release dirs:
          #   arm64-v8a/release/*.apk, armeabi-v7a/release/*.apk
          shopt -s nullglob
          for apk in "$APK_DIR"/*/release/*.apk; do
            # Skip already-signed APKs (re-runs).
            [[ "$apk" == *-unsigned.apk ]] || continue
            signed="${apk%-unsigned.apk}.apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks src-tauri/nclientt.keystore \
              --ks-pass pass:nclientt \
              --ks-key-alias nclientt \
              --key-pass pass:nclientt \
              --out "$signed" \
              --in "$apk"
            echo "Signed: $signed"
            rm -f "$apk"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NClientT-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 2
          if-no-files-found: error

  build-windows:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app (msi + nsis)
        run: npx tauri build --bundles msi,nsis

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NClientT-windows
          path: |
            src-tauri/target/release/bundle/msi/**/*.msi
            src-tauri/target/release/bundle/nsis/**/*.exe
          retention-days: 2
          if-no-files-found: error

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # deb only — AppImage was dropped because it doubles the artifact size
      # (bundles its own runtime) for little benefit over the .deb.
      - name: Build Tauri app (deb)
        run: npx tauri build --bundles deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NClientT-linux
          path: |
            src-tauri/target/release/bundle/deb/**/*.deb
          retention-days: 2
          if-no-files-found: error

  # Collects all three platforms' artifacts and publishes a rolling nightly pre-release,
  # updating the same "nightly" tag in-place. Triggered by a manual workflow_dispatch run
  # on the main branch. Official releases are promoted manually from the nightly pre-release.
  release:
    name: Publish nightly pre-release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-linux]
    # The workflow only has a workflow_dispatch trigger, so we publish whenever it runs on main.
    # Guarding on github.ref keeps the release on the main branch (e.g. not a tag/other branch run).
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          SHORT_SHA="${GITHUB_SHA:0:7}"
          # Capture the build time (UTC, ISO 8601) to stamp into the release
          # notes below. Written to $GITHUB_ENV so later steps can read it.
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

          cp_windows () {
            local ext="$1" out="$2"
            local f
            f=$(find artifacts/NClientT-windows -type f -name "*.${ext}" | head -n1 || true)
            [ -n "$f" ] || { echo "ERROR: no .${ext} found for Windows"; exit 1; }
            cp "$f" "release/${out}"
          }
          cp_windows msi "NClientT-${SHORT_SHA}-windows.msi"
          cp_windows exe "NClientT-${SHORT_SHA}-windows-setup.exe"

          deb=$(find artifacts/NClientT-linux -type f -name "*.deb" | head -n1 || true)
          [ -n "$deb" ] || { echo "ERROR: no .deb found for Linux"; exit 1; }
          cp "$deb" "release/NClientT-${SHORT_SHA}-linux.deb"

          shopt -s nullglob
          apks=( $(find artifacts/NClientT-android -type f -name "*.apk") )
          if [ ${#apks[@]} -eq 0 ]; then
            echo "ERROR: no .apk found for Android"; exit 1
          fi
          for apk in "${apks[@]}"; do
            base=$(basename "$apk")
            # Only arm64-v8a is built now; fall back to the detected ABI in
            # case Tauri's filename scheme changes.
            if [[ "$base" == *arm64* ]]; then abi="arm64-v8a"
            else abi="arm64-v8a"; fi
            cp "$apk" "release/NClientT-${SHORT_SHA}-android-${abi}.apk"
          done

          echo "=== staged release assets ===" && ls -la release/

      - name: Create or update GitHub nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            🏗️ **Nightly Build** — 自动构建产物，每次 main 分支推送更新。

            Commit: [`${GITHUB_SHA:0:7}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            编译时间: ${{ env.BUILD_TIME }}

            ## 下载

            ### Windows
            - `NClientT-${GITHUB_SHA:0:7}-windows.msi` — MSI 安装包（推荐）
            - `NClientT-${GITHUB_SHA:0:7}-windows-setup.exe` — NSIS 安装程序

            ### Linux
            - `NClientT-${GITHUB_SHA:0:7}-linux.deb` — Debian/Ubuntu 安装包

            ### Android (仅 arm64-v8a)
            - `NClientT-${GITHUB_SHA:0:7}-android-arm64-v8a.apk` — 64 位 ARM（现代手机，推荐）

            ## 说明
            - 安卓 APK 已签名，仅包含 arm64-v8a 架构（手机专用）。
            - 桌面端安装包未做代码签名，Windows 首次运行可能弹出 SmartScreen 警告，点「仍要运行」即可。
          files: release/*
          fail_on_unmatched_files: true
